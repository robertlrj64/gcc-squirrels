<style>
body {
    margin: 0;
    overflow: hidden;
}

/* Scene */
#scene {
    width: 100vw;
    height: 100vh;
    background-size: cover;
    background-position: center;
}

/* Black fade overlay */
#fade {
    position: fixed;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    opacity: 0;
    pointer-events: none;
    z-index: 999999; /* <- MUST be higher than overlay + scene */
    transition: opacity 1s ease;
}

/* UI Overlay */
#overlay {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.55);
    color: white;
    padding: 20px;
    display: flex;
    gap: 20px;
    align-items: center;
    font-family: sans-serif;
    z-index: 9500;
}

/* Squirrel image */
#squirrelImage {
    width: 100px;
    height: auto;
	border: 1px;
}

/* Title + description */
#overlayText {
    display: flex;
    flex-direction: column;
}
#overlayTitle {
    font-size: 28px;
    font-weight: bold;
}
#overlayDesc {
    font-size: 16px;
    margin-top: 6px;
    max-width: 600px;
}
</style>

let currentScene = "crawford";

const sceneDiv = document.getElementById("scene");
const fadeDiv = document.getElementById("fade");

const sqImg = document.getElementById("squirrelImage");
const titleBox = document.getElementById("overlayTitle");
const descBox = document.getElementById("overlayDesc");
let typewriterTimeouts = [];
let typing = false;

function typeText(element, text, speed = 25) {
    // Stop any existing typing
    typewriterTimeouts.forEach(t => clearTimeout(t));
    typewriterTimeouts = [];

    element.textContent = "";
    typing = true;

    [...text].forEach((char, i) => {
        const timeout = setTimeout(() => {
            element.textContent += char;
            if (i === text.length - 1) typing = false;
        }, i * speed);
        typewriterTimeouts.push(timeout);
    });
}

// Clicking the box instantly finishes the text
descBox.addEventListener("click", () => {
    if (typing) {
        typewriterTimeouts.forEach(t => clearTimeout(t));
        descBox.textContent = scenes[currentScene].description;
        typing = false;
    }
});

// ===== UPDATE OVERLAY =====
function updateOverlay(sceneObj) {
    sqImg.src = sceneObj.squirrel ?? "";
    titleBox.textContent = sceneObj.title ?? "";

    // Typewriter effect for description
    typeText(descBox, sceneObj.description ?? "", 22);
}

// ===== LOAD SCENE =====
function loadScene(name) {
    // Force reflow to allow transition to apply
    fadeDiv.style.transition = "none";
    fadeDiv.style.opacity = "0";
    fadeDiv.getBoundingClientRect();  // <- forces reflow

    // Now turn transition back on and fade to black
    fadeDiv.style.transition = "opacity 0.5s ease";
    fadeDiv.style.opacity = "1";

    // After fade out completes, swap scene
    setTimeout(() => {
        currentScene = name;
        const s = scenes[name];

        sceneDiv.style.backgroundImage = `url('${s.image}')`;
        updateOverlay(s);

        // Fade back in
        fadeDiv.style.opacity = "0";
    }, 500); // 1 second = length of fade
}
loadScene(currentScene);

// ===== CURSOR LOGIC =====
document.addEventListener("mousemove", (e) => {
    const x = e.clientX;
    const y = e.clientY;
    const width = window.innerWidth;
    const height = window.innerHeight;

    const leftZone = width * 0.25;
    const rightZone = width * 0.75;

	// Back zone starts above overlay (overlay is ~150px tall)
	const bottomZone = height * 0.60; 
    // const bottomZone = height * 0.75; // back arrow only near bottom

    const s = scenes[currentScene];
    let cursor = "default";

    if (y > bottomZone && s.back) {
        cursor = downCursor;
    }
    else if (x < leftZone && s.left) {
        cursor = leftCursor;
    }
    else if (x > rightZone && s.right) {
        cursor = rightCursor;
    }
    else if (s.forward) {
        cursor = upCursor;
    }

    document.body.style.cursor = cursor;
});

// ===== CLICK NAVIGATION =====
sceneDiv.addEventListener("click", (e) => {
    const x = e.clientX;
    const y = e.clientY;
    const width = window.innerWidth;
    const height = window.innerHeight;

    const leftZone = width * 0.25;
    const rightZone = width * 0.75;
    
    // Back zone shifted upward
    const bottomZone = height * 0.60;

    const s = scenes[currentScene];

    if (y > bottomZone && s.back) {
        loadScene(s.back);
    }
    else if (x < leftZone && s.left) {
        loadScene(s.left);
    }
    else if (x > rightZone && s.right) {
        loadScene(s.right);
    }
    else if (s.forward) {
        loadScene(s.forward);
    }
});
